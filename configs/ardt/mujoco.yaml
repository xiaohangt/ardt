method: ardt
normalize: false
train_args:
  gamma: 1.0
  scale: 1000.0
  mse_epochs: 10
  maxmin_epochs: 50
  
  ret_obs_action_model:
    hidden_size: 512
    num_layers: 2
    activation: "relu"
    batchnorm: False
    layernorm: False
    dropout: 0.0

  return_model:
    hidden_size: 512
    num_layers: 2
    activation: "relu"
    batchnorm: False
    layernorm: False
    dropout: 0.0
